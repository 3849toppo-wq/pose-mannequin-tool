<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ポーズマネキン AI動画参考</title>
    <style>
        body { 
            margin: 0; padding: 10px; background: #f8f8f8; font-family: sans-serif; 
            touch-action: none;
        }
        h1 { font-size: 1.2em; margin: 5px 0; }
        canvas { 
            border: 2px solid #333; background: white; display: block; margin: 10px auto; 
            max-width: 100%; touch-action: none;
        }
        .controls { text-align: center; margin: 10px 0; }
        button { 
            padding: 12px 20px; margin: 5px; font-size: 1em; background: #4a90e2; color: white; 
            border: none; border-radius: 6px;
        }
        .info { font-size: 0.9em; color: #666; text-align: center; }
    </style>
</head>
<body>
    <h1>📍 ポーズマネキン (AI動画用・関節曲がり)</h1>
    <p class="info">各関節をドラッグ → 肘膝手足が自然に曲がる</p>
    
    <canvas id="canvas" width="320" height="480"></canvas>
    
    <div class="controls">
        <button onclick="resetPose()">リセット</button>
        <button onclick="exportPNG()">📷 PNG保存</button>
        <button onclick="randomPose()">ランダム</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let points = {
            head: {x: 160, y: 80},
            chest: {x: 160, y: 160},
            waist: {x: 160, y: 240},
            lElbow: {x: 100, y: 200},
            rElbow: {x: 220, y: 200},
            lWrist: {x: 60, y: 260},
            rWrist: {x: 260, y: 260},
            lHand: {x: 40, y: 280},
            rHand: {x: 280, y: 280},
            lKnee: {x: 130, y: 340},
            rKnee: {x: 190, y: 340},
            lAnkle: {x: 120, y: 420},
            rAnkle: {x: 200, y: 420},
            lFoot: {x: 110, y: 450},
            rFoot: {x: 210, y: 450}
        };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 12;
            ctx.strokeStyle = '#333';
            
            // 体
            ctx.beginPath();
            ctx.moveTo(points.chest.x, points.chest.y);
            ctx.lineTo(points.waist.x, points.waist.y);
            ctx.stroke();
            
            // 頭
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.arc(points.head.x, points.head.y, 28, 0, Math.PI * 2);
            ctx.stroke();
            ctx.lineWidth = 12;
            
            // 左腕
            drawSegment(points.chest, points.lElbow);
            drawSegment(points.lElbow, points.lWrist);
            drawSegment(points.lWrist, points.lHand);
            // 右腕
            drawSegment(points.chest, points.rElbow);
            drawSegment(points.rElbow, points.rWrist);
            drawSegment(points.rWrist, points.rHand);
            
            // 左脚
            drawSegment(points.waist, points.lKnee);
            drawSegment(points.lKnee, points.lAnkle);
            drawSegment(points.lAnkle, points.lFoot);
            // 右脚
            drawSegment(points.waist, points.rKnee);
            drawSegment(points.rKnee, points.rAnkle);
            drawSegment(points.rAnkle, points.rFoot);
            
            // 関節
            ctx.fillStyle = '#e74c3c';
            Object.values(points).forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawSegment(start, end) {
            ctx.beginPath();
            ctx.moveTo(start.x, start.y);
            ctx.lineTo(end.x, end.y);
            ctx.stroke();
        }

        function resetPose() {
            points = {
                head: {x: 160, y: 80},
                chest: {x: 160, y: 160},
                waist: {x: 160, y: 240},
                lElbow: {x: 100, y: 200},
                rElbow: {x: 220, y: 200},
                lWrist: {x: 60, y: 260},
                rWrist: {x: 260, y: 260},
                lHand: {x: 40, y: 280},
                rHand: {x: 280, y: 280},
                lKnee: {x: 130, y: 340},
                rKnee: {x: 190, y: 340},
                lAnkle: {x: 120, y: 420},
                rAnkle: {x: 200, y: 420},
                lFoot: {x: 110, y: 450},
                rFoot: {x: 210, y: 450}
            };
            draw();
        }

        function randomPose() {
            // ランダム調整（簡易）
            resetPose();
            Object.keys(points).forEach(key => {
                if (!['head','chest','waist'].includes(key)) {
                    points[key].x += (Math.random() - 0.5) * 60;
                    points[key].y += (Math.random() - 0.5) * 60;
                }
            });
            draw();
        }

        function exportPNG() {
            const link = document.createElement('a');
            link.download = 'pose-reference.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        let dragging = null;
        const dragPoints = Object.keys(points);

        function getTouchPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: Math.max(20, Math.min(300, clientX - rect.left)), y: Math.max(20, Math.min(460, clientY - rect.top)) };
        }

        function startDrag(e) {
            e.preventDefault();
            const pos = getTouchPos(e);
            for (let key of dragPoints) {
                const p = points[key];
                if (Math.hypot(p.x - pos.x, p.y - pos.y) < 25) {
                    dragging = key;
                    break;
                }
            }
        }

        function moveDrag(e) {
            if (!dragging) return;
            e.preventDefault();
            const pos = getTouchPos(e);
            points[dragging].x = pos.x;
            points[dragging].y = pos.y;
            draw();
        }

        function endDrag() {
            dragging = null;
            draw(); // 最終描画
        }

        // ボタン用グローバル関数
        window.resetPose = resetPose;
        window.randomPose = randomPose;
        window.exportPNG = exportPNG;

        // イベント
        canvas.addEventListener('mousedown', startDrag);
        canvas.addEventListener('mousemove', moveDrag);
        canvas.addEventListener('mouseup', endDrag);
        canvas.addEventListener('mouseleave', endDrag);
        canvas.addEventListener('touchstart', startDrag);
        canvas.addEventListener('touchmove', moveDrag);
        canvas.addEventListener('touchend', endDrag);

        resetPose();
    </script>
</body>
</html>
